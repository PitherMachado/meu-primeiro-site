<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedrinho vs Dragoes Bobos</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #8ed6ff 0%, #b9ecff 60%, #f6fbff 100%);
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
      cursor: default;
    }
    canvas {
      display: block;
    }
    #hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 12px 14px;
      border-radius: 14px;
      min-width: 280px;
      line-height: 1.35;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.15);
    }
    #hud .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #ffe066;
    }
    #hud .small {
      font-size: 12px;
      opacity: 0.95;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.48);
      z-index: 30;
    }
    #overlayBox {
      width: min(92vw, 700px);
      background: linear-gradient(180deg, #fff 0%, #eef8ff 100%);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
      border: 3px solid #1f6feb22;
    }
    #overlayBox h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 48px);
      color: #1f4b8f;
    }
    #overlayBox p {
      margin: 8px 0;
      color: #1e2d3d;
      font-size: clamp(16px, 2vw, 20px);
    }
    #overlayBox button {
      margin-top: 18px;
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 18px;
      font-weight: 700;
      background: #ffb703;
      color: #1d1d1d;
      box-shadow: 0 8px 20px rgba(255,183,3,0.35);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">Pedrinho vs Dragões Bobos</div>
    <div id="hudStats"></div>
    <div class="small">
      W = frente • S = trás • SPACE = pulo • D = joga pedra • A = defesa • Clique esquerdo = dança engraçada • R = reiniciar
    </div>
  </div>

  <div id="overlay">
    <div id="overlayBox">
      <h1 id="overlayTitle">Vitória!</h1>
      <p id="overlayText"></p>
      <button onclick="restartGame()">Jogar novamente</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hudStats = document.getElementById('hudStats');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const GRAVITY = 0.75;
    const GROUND_Y = () => canvas.height - 120;
    const WORLD_WIDTH = 6200;
    const FLAG_X = 5860;
    const keys = {};
    let mouseDanceRequested = false;

    const clouds = Array.from({ length: 16 }, (_, i) => ({
      x: i * 420 + Math.random() * 120,
      y: 60 + Math.random() * 170,
      s: 0.7 + Math.random() * 1.1
    }));

    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      keys[k] = true;
      if (e.code === 'Space') e.preventDefault();
      if (k === 'r') restartGame();
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });
    window.addEventListener('mousedown', (e) => {
      if (e.button === 0) mouseDanceRequested = true;
    });

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function createGameState() {
      return {
        cameraX: 0,
        gameOver: false,
        win: false,
        message: '',
        particles: [],
        projectiles: [],
        enemyFireballs: [],
        coins: createCoins(),
        platforms: createPlatforms(),
        enemies: createEnemies(),
        player: {
          x: 120,
          y: GROUND_Y() - 88,
          w: 56,
          h: 88,
          vx: 0,
          vy: 0,
          facing: 1,
          speed: 4.1,
          jumpPower: -15.5,
          grounded: false,
          hp: 5,
          stones: 18,
          score: 0,
          defend: false,
          invincibleTimer: 0,
          danceTimer: 0,
          throwCooldown: 0,
          animTime: 0
        }
      };
    }

    let state = createGameState();

    function createCoins() {
      const coins = [];
      for (let i = 0; i < 44; i++) {
        let x = 330 + i * 120 + ((i % 4) * 12);
        let y = (i % 7 === 0) ? GROUND_Y() - 180 : GROUND_Y() - 44 - ((i % 3) * 8);
        coins.push({ x, y, r: 13, taken: false, bob: Math.random() * Math.PI * 2 });
      }
      [
        { x: 890, y: GROUND_Y() - 210 },
        { x: 1360, y: GROUND_Y() - 260 },
        { x: 1880, y: GROUND_Y() - 240 },
        { x: 2390, y: GROUND_Y() - 270 },
        { x: 3420, y: GROUND_Y() - 240 },
        { x: 4180, y: GROUND_Y() - 250 },
        { x: 4760, y: GROUND_Y() - 260 },
      ].forEach(c => coins.push({ ...c, r: 13, taken: false, bob: Math.random() * Math.PI * 2 }));
      return coins;
    }

    function createPlatforms() {
      return [
        { x: 640, y: GROUND_Y() - 120, w: 150, h: 24 },
        { x: 860, y: GROUND_Y() - 190, w: 140, h: 24 },
        { x: 1130, y: GROUND_Y() - 110, w: 180, h: 24 },
        { x: 1320, y: GROUND_Y() - 240, w: 160, h: 24 },
        { x: 1630, y: GROUND_Y() - 150, w: 180, h: 24 },
        { x: 1840, y: GROUND_Y() - 220, w: 150, h: 24 },
        { x: 2210, y: GROUND_Y() - 120, w: 170, h: 24 },
        { x: 2360, y: GROUND_Y() - 250, w: 180, h: 24 },
        { x: 2810, y: GROUND_Y() - 160, w: 200, h: 24 },
        { x: 3260, y: GROUND_Y() - 130, w: 170, h: 24 },
        { x: 3410, y: GROUND_Y() - 250, w: 150, h: 24 },
        { x: 3900, y: GROUND_Y() - 170, w: 220, h: 24 },
        { x: 4160, y: GROUND_Y() - 270, w: 150, h: 24 },
        { x: 4580, y: GROUND_Y() - 140, w: 210, h: 24 },
        { x: 4950, y: GROUND_Y() - 230, w: 170, h: 24 },
        { x: 5300, y: GROUND_Y() - 170, w: 200, h: 24 },
      ];
    }

    function createEnemies() {
      return [
        makeEnemy(760, 'Spitty'),
        makeEnemy(1210, 'Rabugento'),
        makeEnemy(1760, 'Guspi-Fogo'),
        makeEnemy(2300, 'Bafinho'),
        makeEnemy(3020, 'Zé Labareda'),
        makeEnemy(3640, 'Bocão'),
        makeEnemy(4290, 'Pimentinha'),
        makeEnemy(4880, 'Brasa Jr'),
        makeEnemy(5520, 'Chefão Bobo', true),
      ];
    }

    function makeEnemy(x, name, boss = false) {
      return {
        name,
        x,
        y: GROUND_Y() - (boss ? 100 : 74),
        w: boss ? 86 : 64,
        h: boss ? 100 : 74,
        dir: Math.random() > 0.5 ? 1 : -1,
        speed: boss ? 1.1 : 0.9 + Math.random() * 0.5,
        patrolMin: x - 120,
        patrolMax: x + 120,
        fireCooldown: 70 + Math.random() * 90,
        hp: boss ? 6 : 2,
        boss
      };
    }

    function restartGame() {
      state = createGameState();
      overlay.style.display = 'none';
    }

    function endGame(win, text) {
      state.gameOver = true;
      state.win = win;
      state.message = text;
      overlayTitle.textContent = win ? 'Vitória!' : 'Game Over';
      overlayText.textContent = text;
      overlay.style.display = 'flex';
    }

    function spawnParticles(x, y, color, amount = 12) {
      for (let i = 0; i < amount; i++) {
        state.particles.push({
          x, y,
          vx: -3 + Math.random() * 6,
          vy: -4 + Math.random() * 5,
          life: 22 + Math.random() * 16,
          color,
          size: 3 + Math.random() * 5
        });
      }
    }

    function update() {
      if (state.gameOver) return;

      const p = state.player;
      p.animTime += 1;
      p.defend = !!keys['a'];

      if (mouseDanceRequested && p.grounded) {
        p.danceTimer = 50;
        mouseDanceRequested = false;
      }

      if (p.danceTimer > 0) {
        p.danceTimer--;
        p.vx = Math.sin(p.animTime * 0.55) * 2.5;
      } else {
        if (keys['w']) {
          p.vx = p.speed;
          p.facing = 1;
        } else if (keys['s']) {
          p.vx = -p.speed;
          p.facing = -1;
        } else {
          p.vx *= 0.7;
          if (Math.abs(p.vx) < 0.15) p.vx = 0;
        }

        if (keys[' '] && p.grounded) {
          p.vy = p.jumpPower;
          p.grounded = false;
        }
      }

      if ((keys['d']) && p.throwCooldown <= 0 && p.stones > 0) {
        p.stones--;
        p.throwCooldown = 18;
        state.projectiles.push({
          x: p.x + p.w / 2,
          y: p.y + 30,
          w: 18,
          h: 18,
          vx: p.facing * 9.5,
          vy: -2.3,
          rot: 0
        });
      }
      if (p.throwCooldown > 0) p.throwCooldown--;

      p.vy += GRAVITY;
      p.x += p.vx;
      p.y += p.vy;

      p.x = clamp(p.x, 0, WORLD_WIDTH - p.w);
      p.grounded = false;

      if (p.y + p.h >= GROUND_Y()) {
        p.y = GROUND_Y() - p.h;
        p.vy = 0;
        p.grounded = true;
      }

      for (const plat of state.platforms) {
        const feetPrev = p.y + p.h - p.vy;
        const isLanding = p.vy >= 0 && feetPrev <= plat.y + 8 && p.x + p.w > plat.x && p.x < plat.x + plat.w && p.y + p.h >= plat.y && p.y + p.h <= plat.y + 40;
        if (isLanding) {
          p.y = plat.y - p.h;
          p.vy = 0;
          p.grounded = true;
        }
      }

      if (p.invincibleTimer > 0) p.invincibleTimer--;

      for (const coin of state.coins) {
        coin.bob += 0.08;
        if (!coin.taken) {
          const cRect = { x: coin.x - coin.r, y: coin.y - coin.r, w: coin.r * 2, h: coin.r * 2 };
          if (rectsOverlap(p, cRect)) {
            coin.taken = true;
            p.score += 10;
            spawnParticles(coin.x, coin.y, '#ffd43b', 10);
          }
        }
      }

      for (const proj of state.projectiles) {
        proj.x += proj.vx;
        proj.y += proj.vy;
        proj.vy += 0.18;
        proj.rot += 0.35;
      }
      state.projectiles = state.projectiles.filter(pr => pr.x > -100 && pr.x < WORLD_WIDTH + 100 && pr.y < canvas.height + 80);

      for (const enemy of state.enemies) {
        if (enemy.hp <= 0) continue;
        enemy.x += enemy.dir * enemy.speed;
        if (enemy.x < enemy.patrolMin || enemy.x > enemy.patrolMax) enemy.dir *= -1;

        enemy.fireCooldown--;
        const nearPlayer = Math.abs(enemy.x - p.x) < 650;
        if (enemy.fireCooldown <= 0 && nearPlayer) {
          enemy.fireCooldown = enemy.boss ? 45 : 85 + Math.random() * 50;
          const dir = p.x > enemy.x ? 1 : -1;
          state.enemyFireballs.push({
            x: enemy.x + enemy.w / 2,
            y: enemy.y + 24,
            w: enemy.boss ? 28 : 22,
            h: enemy.boss ? 28 : 22,
            vx: dir * (enemy.boss ? 6.5 : 5.2),
            vy: -1.5 - Math.random() * 0.8,
            life: 190,
            boss: enemy.boss
          });
        }
      }

      for (const fire of state.enemyFireballs) {
        fire.x += fire.vx;
        fire.y += fire.vy;
        fire.vy += 0.08;
        fire.life--;
      }
      state.enemyFireballs = state.enemyFireballs.filter(f => f.life > 0 && f.y < canvas.height + 120 && f.x > -150 && f.x < WORLD_WIDTH + 150);

      for (const proj of state.projectiles) {
        for (const enemy of state.enemies) {
          if (enemy.hp > 0 && rectsOverlap(proj, enemy)) {
            enemy.hp--;
            proj.x = -9999;
            p.score += enemy.hp <= 0 ? 120 : 30;
            spawnParticles(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.hp <= 0 ? '#7bd88f' : '#ff9f1c', enemy.hp <= 0 ? 20 : 10);
          }
        }
      }

      for (const fire of state.enemyFireballs) {
        if (rectsOverlap(fire, p)) {
          fire.life = 0;
          if (p.defend) {
            p.score += 5;
            spawnParticles(p.x + p.w / 2, p.y + 30, '#80ed99', 8);
          } else if (p.invincibleTimer <= 0) {
            p.hp--;
            p.invincibleTimer = 55;
            spawnParticles(p.x + p.w / 2, p.y + 20, '#ff4d6d', 16);
            if (p.hp <= 0) {
              endGame(false, 'Pedrinho foi torrado pelos dragões bobos. Aperte o botão e tente de novo.');
            }
          }
        }
      }

      for (const enemy of state.enemies) {
        if (enemy.hp <= 0) continue;
        if (rectsOverlap(p, enemy)) {
          if (p.defend) {
            enemy.dir *= -1;
            p.score += 3;
          } else if (p.invincibleTimer <= 0) {
            p.hp--;
            p.invincibleTimer = 45;
            p.vx = enemy.x > p.x ? -5 : 5;
            p.vy = -6;
            spawnParticles(p.x + p.w / 2, p.y + 20, '#ff4d6d', 14);
            if (p.hp <= 0) {
              endGame(false, 'Os inimigos engraçados venceram essa rodada. Bora tentar de novo.');
            }
          }
        }
      }

      for (const part of state.particles) {
        part.x += part.vx;
        part.y += part.vy;
        part.vy += 0.08;
        part.life--;
      }
      state.particles = state.particles.filter(pt => pt.life > 0);

      if (p.x + p.w >= FLAG_X) {
        endGame(true, `Você chegou na bandeirinha com ${p.score} pontos e ${p.hp} corações restantes.`);
      }

      state.cameraX = clamp(p.x - canvas.width * 0.35, 0, WORLD_WIDTH - canvas.width);
      mouseDanceRequested = false;
    }

    function drawBackground() {
      const cam = state.cameraX;

      ctx.fillStyle = '#8ed6ff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const c of clouds) {
        const x = c.x - cam * 0.2;
        const y = c.y;
        drawCloud(x, y, c.s);
      }

      drawMountainRange(0.15, 430, '#91c483', '#6ea96b');
      drawMountainRange(0.28, 520, '#7db36f', '#5d9657');

      // chão principal
      ctx.fillStyle = '#6b8f3e';
      ctx.fillRect(0, GROUND_Y(), canvas.width, canvas.height - GROUND_Y());
      ctx.fillStyle = '#7f5539';
      ctx.fillRect(0, GROUND_Y() + 28, canvas.width, canvas.height - (GROUND_Y() + 28));

      // linha decorativa do chão
      for (let i = -1; i < canvas.width / 44 + 2; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#7fbf4d' : '#8dcb56';
        ctx.fillRect(i * 44, GROUND_Y(), 24, 14);
      }
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.beginPath();
      ctx.arc(0, 0, 24, 0, Math.PI * 2);
      ctx.arc(28, -10, 28, 0, Math.PI * 2);
      ctx.arc(58, 0, 24, 0, Math.PI * 2);
      ctx.arc(28, 12, 26, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawMountainRange(parallax, step, colorA, colorB) {
      const cam = state.cameraX * parallax;
      for (let x = -300; x < WORLD_WIDTH; x += step) {
        const sx = x - cam;
        const baseY = canvas.height - 120;
        ctx.fillStyle = ((x / step) % 2 === 0) ? colorA : colorB;
        ctx.beginPath();
        ctx.moveTo(sx, baseY);
        ctx.lineTo(sx + step * 0.35, baseY - 150);
        ctx.lineTo(sx + step * 0.65, baseY - 60);
        ctx.lineTo(sx + step, baseY);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawPlatforms() {
      const cam = state.cameraX;
      for (const p of state.platforms) {
        const x = p.x - cam;
        ctx.fillStyle = '#d9a441';
        roundRect(x, p.y, p.w, p.h, 8, true);
        ctx.fillStyle = '#f2c96b';
        roundRect(x + 4, p.y + 4, p.w - 8, p.h - 8, 6, true);
        for (let i = 14; i < p.w; i += 28) {
          ctx.fillStyle = '#b37b22';
          ctx.fillRect(x + i, p.y + 5, 4, p.h - 10);
        }
      }
    }

    function drawCoins() {
      const cam = state.cameraX;
      for (const coin of state.coins) {
        if (coin.taken) continue;
        const y = coin.y + Math.sin(coin.bob) * 5;
        const x = coin.x - cam;
        ctx.fillStyle = '#ffd43b';
        ctx.beginPath();
        ctx.arc(x, y, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff3bf';
        ctx.beginPath();
        ctx.arc(x - 4, y - 4, coin.r * 0.32, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#e09f00';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    function drawFlag() {
      const cam = state.cameraX;
      const poleX = FLAG_X - cam;
      const poleY = GROUND_Y() - 260;
      ctx.fillStyle = '#bcbcbc';
      ctx.fillRect(poleX, poleY, 8, 260);
      ctx.beginPath();
      ctx.arc(poleX + 4, poleY, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff3b30';
      ctx.beginPath();
      ctx.moveTo(poleX + 8, poleY + 18);
      ctx.lineTo(poleX + 110, poleY + 48);
      ctx.lineTo(poleX + 8, poleY + 82);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px Arial';
      ctx.fillText('FIM', poleX + 24, poleY + 56);
    }

    function drawPlayer() {
      const p = state.player;
      const cam = state.cameraX;
      const x = p.x - cam;
      const y = p.y;
      const blink = p.invincibleTimer > 0 && Math.floor(p.invincibleTimer / 4) % 2 === 0;
      if (blink) return;

      ctx.save();
      ctx.translate(x + p.w / 2, y + p.h / 2);
      const danceRot = p.danceTimer > 0 ? Math.sin(p.animTime * 0.6) * 0.28 : 0;
      ctx.rotate(danceRot);
      ctx.scale(p.facing, 1);

      // sombra
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(0, p.h / 2 + 8, 22, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // capa traseira
      ctx.fillStyle = '#3a86ff';
      roundRect(-14, -10, 26, 42, 10, true);

      // pernas
      const legSwing = p.danceTimer > 0 ? Math.sin(p.animTime * 0.9) * 10 : Math.sin(p.animTime * 0.35) * Math.min(8, Math.abs(p.vx) * 2.3);
      ctx.fillStyle = '#2d2a32';
      roundRect(-16, 22, 12, 34, 6, true);
      roundRect(4, 22, 12, 34, 6, true);
      ctx.fillStyle = '#ff8fab';
      roundRect(-20 + legSwing * 0.15, 48, 18, 10, 6, true);
      roundRect(2 - legSwing * 0.15, 48, 18, 10, 6, true);

      // corpo
      ctx.fillStyle = '#ffd166';
      roundRect(-20, -16, 40, 42, 14, true);
      ctx.fillStyle = '#ff5d8f';
      roundRect(-10, -8, 20, 18, 8, true);

      // braços
      let armY = -2;
      let leftArmRot = p.defend ? -0.8 : (p.danceTimer > 0 ? Math.sin(p.animTime * 0.85) * 1.2 : 0.2);
      let rightArmRot = p.danceTimer > 0 ? -Math.sin(p.animTime * 0.85) * 1.2 : -0.2;

      ctx.save();
      ctx.translate(-20, armY);
      ctx.rotate(leftArmRot);
      ctx.fillStyle = '#ffd166';
      roundRect(-6, -4, 12, 30, 6, true);
      if (p.defend) {
        ctx.fillStyle = '#4dabf7';
        roundRect(-22, -10, 24, 28, 6, true);
        ctx.strokeStyle = '#d0ebff';
        ctx.lineWidth = 3;
        ctx.strokeRect(-18, -6, 16, 20);
      }
      ctx.restore();

      ctx.save();
      ctx.translate(20, armY);
      ctx.rotate(rightArmRot);
      ctx.fillStyle = '#ffd166';
      roundRect(-6, -4, 12, 30, 6, true);
      ctx.restore();

      // cabeça
      ctx.fillStyle = '#ffddb3';
      ctx.beginPath();
      ctx.arc(0, -32, 22, 0, Math.PI * 2);
      ctx.fill();

      // cabelo
      ctx.fillStyle = '#6a4c2a';
      ctx.beginPath();
      ctx.arc(0, -38, 18, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-14, -38, 28, 10);

      // olhos
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(-7, -34, 2.5, 0, Math.PI * 2);
      ctx.arc(7, -34, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // boca
      ctx.strokeStyle = '#b03a5b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      if (p.danceTimer > 0) {
        ctx.arc(0, -25, 8, 0.2, Math.PI - 0.2);
      } else {
        ctx.arc(0, -26, 6, 0.1, Math.PI - 0.1);
      }
      ctx.stroke();

      // boné/tiara engraçada
      ctx.fillStyle = '#06d6a0';
      roundRect(-18, -52, 36, 10, 5, true);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 10px Arial';
      ctx.scale(p.facing, 1);
      ctx.fillText('P', -3, -44);

      ctx.restore();
    }

    function drawEnemy(enemy) {
      const cam = state.cameraX;
      const x = enemy.x - cam;
      const y = enemy.y;
      if (enemy.hp <= 0) return;

      ctx.save();
      ctx.translate(x + enemy.w / 2, y + enemy.h / 2);
      ctx.scale(enemy.dir < 0 ? -1 : 1, 1);

      // sombra
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.beginPath();
      ctx.ellipse(0, enemy.h / 2 + 8, enemy.w * 0.28, 7, 0, 0, Math.PI * 2);
      ctx.fill();

      // corpo
      ctx.fillStyle = enemy.boss ? '#9b5de5' : '#ff7b54';
      roundRect(-enemy.w * 0.38, -enemy.h * 0.26, enemy.w * 0.76, enemy.h * 0.62, 20, true);

      // barriga
      ctx.fillStyle = enemy.boss ? '#d0b3ff' : '#ffd6a5';
      roundRect(-enemy.w * 0.18, -enemy.h * 0.04, enemy.w * 0.36, enemy.h * 0.28, 14, true);

      // asas pequenas engraçadas
      ctx.fillStyle = '#ffcad4';
      roundRect(-enemy.w * 0.48, -enemy.h * 0.12, enemy.w * 0.14, enemy.h * 0.25, 10, true);
      roundRect(enemy.w * 0.34, -enemy.h * 0.12, enemy.w * 0.14, enemy.h * 0.25, 10, true);

      // olhos
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-10, -16, 8, 0, Math.PI * 2);
      ctx.arc(10, -16, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(-8, -15, 3, 0, Math.PI * 2);
      ctx.arc(12, -15, 3, 0, Math.PI * 2);
      ctx.fill();

      // chifres
      ctx.fillStyle = '#f4f1de';
      ctx.beginPath();
      ctx.moveTo(-18, -32); ctx.lineTo(-10, -48); ctx.lineTo(-2, -30); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(6, -30); ctx.lineTo(14, -48); ctx.lineTo(22, -32); ctx.closePath(); ctx.fill();

      // boca
      ctx.fillStyle = '#8d0801';
      roundRect(-16, 0, 32, 14, 7, true);
      ctx.fillStyle = '#ffd166';
      ctx.fillRect(-10, 0, 4, 7);
      ctx.fillRect(6, 0, 4, 7);

      // label de hp
      ctx.scale(enemy.dir < 0 ? -1 : 1, 1);
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      roundRect(-30, -enemy.h / 2 - 22, 60, 10, 5, true);
      ctx.fillStyle = '#ef476f';
      roundRect(-30, -enemy.h / 2 - 22, (enemy.hp / (enemy.boss ? 6 : 2)) * 60, 10, 5, true);

      ctx.restore();
    }

    function drawProjectile(pr) {
      const cam = state.cameraX;
      const x = pr.x - cam;
      ctx.save();
      ctx.translate(x, pr.y);
      ctx.rotate(pr.rot);
      ctx.fillStyle = '#7f5539';
      ctx.beginPath();
      ctx.arc(0, 0, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#a68a64';
      ctx.beginPath();
      ctx.arc(-2, -2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawFireball(fire) {
      const cam = state.cameraX;
      const x = fire.x - cam;
      const r = fire.boss ? 15 : 11;
      const pulse = Math.sin(performance.now() * 0.02 + x * 0.1) * 2;
      ctx.fillStyle = '#ff6b35';
      ctx.beginPath();
      ctx.arc(x, fire.y, r + pulse * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffd166';
      ctx.beginPath();
      ctx.arc(x, fire.y, r * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,100,0,0.3)';
      ctx.beginPath();
      ctx.arc(x - fire.vx * 0.5, fire.y, r * 1.35, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawParticles() {
      for (const pt of state.particles) {
        ctx.globalAlpha = Math.max(0, pt.life / 38);
        ctx.fillStyle = pt.color;
        ctx.beginPath();
        ctx.arc(pt.x - state.cameraX, pt.y, pt.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawHUD() {
      const p = state.player;
      hudStats.innerHTML = `❤️ Vida: <b>${p.hp}</b> &nbsp; 🪨 Pedras: <b>${p.stones}</b> &nbsp; ⭐ Pontos: <b>${p.score}</b><br>📍 Progresso: <b>${Math.min(100, Math.floor((p.x / FLAG_X) * 100))}%</b>`;
    }

    function roundRect(x, y, w, h, r, fill = false, stroke = false) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawPlatforms();
      drawCoins();
      drawFlag();
      for (const enemy of state.enemies) drawEnemy(enemy);
      for (const pr of state.projectiles) drawProjectile(pr);
      for (const fire of state.enemyFireballs) drawFireball(fire);
      drawPlayer();
      drawParticles();
      drawHUD();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
